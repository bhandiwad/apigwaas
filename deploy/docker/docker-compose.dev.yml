# ============================================================================
# CloudInfinit API Gateway - Development Override
# Adds hot-reload, debug ports, and relaxed resource limits
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ============================================================================

version: "3.9"

services:
  platform:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.dev
    environment:
      - NODE_ENV=development
      - DEBUG=*
    volumes:
      - ../../client:/app/client
      - ../../server:/app/server
      - ../../shared:/app/shared
      - ../../drizzle:/app/drizzle
      - /app/node_modules
    ports:
      - "3000:3000"
      - "9229:9229"  # Node.js debugger

  mysql:
    ports:
      - "3306:3306"

  mongodb:
    ports:
      - "27017:27017"

  elasticsearch:
    environment:
      - ES_JAVA_OPTS=-Xms256m -Xmx256m

  gravitee-management-api:
    environment:
      - gravitee_api_rest_cors_allow-origin=*
      - gravitee_api_rest_cors_allow-headers=*
      - gravitee_api_rest_cors_allow-methods=*

  # ─── Adminer (DB GUI) ──────────────────────────────────────────────────────
  adminer:
    image: adminer:4
    container_name: apigw-adminer
    ports:
      - "8086:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=mysql
    networks:
      - apigw-network
    restart: unless-stopped

  # ─── Mongo Express (MongoDB GUI) ────────────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0
    container_name: apigw-mongo-express
    ports:
      - "8087:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_ROOT_USER:-admin}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_ROOT_PASSWORD:-admin_secret}
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-admin_secret}@mongodb:27017/
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - apigw-network
    restart: unless-stopped
