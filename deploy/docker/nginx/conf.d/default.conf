# ============================================================================
# CloudInfinit API Gateway - Nginx Virtual Host Configuration
# Routes traffic to platform, gateway, and Gravitee UIs
# ============================================================================

# Upstream definitions
upstream platform_backend {
    server platform:3000;
    keepalive 32;
}

upstream gravitee_gateway {
    server gravitee-gateway:8082;
    keepalive 64;
}

upstream gravitee_mgmt_api {
    server gravitee-management-api:8083;
    keepalive 16;
}

upstream gravitee_console {
    server gravitee-console-ui:8080;
    keepalive 8;
}

upstream gravitee_portal {
    server gravitee-portal-ui:8080;
    keepalive 8;
}

# ─── Main Platform (port 80) ─────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── CloudInfinit Platform ────────────────────────────────────────────────
    location / {
        proxy_pass http://platform_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── API Gateway (Gravitee) ───────────────────────────────────────────────
    location /gateway/ {
        limit_req zone=gateway burst=200 nodelay;
        rewrite ^/gateway/(.*) /$1 break;
        proxy_pass http://gravitee_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # ─── Gravitee Management API ──────────────────────────────────────────────
    location /management/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://gravitee_mgmt_api/management/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Gravitee Portal API ──────────────────────────────────────────────────
    location /portal/ {
        proxy_pass http://gravitee_mgmt_api/portal/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Gravitee Console UI ──────────────────────────────────────────────────
    location /console/ {
        rewrite ^/console/(.*) /$1 break;
        proxy_pass http://gravitee_console;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Gravitee Developer Portal UI ─────────────────────────────────────────
    location /developer-portal/ {
        rewrite ^/developer-portal/(.*) /$1 break;
        proxy_pass http://gravitee_portal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Health Check Endpoint ────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ─── Deny access to hidden files ──────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
