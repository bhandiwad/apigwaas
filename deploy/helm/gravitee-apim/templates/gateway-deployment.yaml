apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    app.kubernetes.io/name: gravitee-apim
    app.kubernetes.io/component: gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  {{- if not .Values.gateway.autoscaling.enabled }}
  replicas: {{ .Values.gateway.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: gravitee-apim
      app.kubernetes.io/component: gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gravitee-apim
        app.kubernetes.io/component: gateway
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.service.port }}
            - name: internal
              containerPort: {{ .Values.gateway.service.internalPort }}
          env:
            - name: JAVA_OPTS
              value: "{{ .Values.gateway.jvmOpts }}"
            - name: gravitee_management_mongodb_uri
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-mongodb-uri
                  key: uri
            - name: gravitee_ratelimit_redis_host
              value: "{{ .Values.redis.host }}"
            - name: gravitee_ratelimit_redis_port
              value: "{{ .Values.redis.port }}"
            - name: gravitee_ratelimit_redis_password
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret }}
                  key: redis-password
            - name: gravitee_reporters_elasticsearch_endpoints_0
              value: "http://{{ .Release.Name }}-elasticsearch:9200"
            {{- range .Values.gateway.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /_node/health
              port: internal
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /_node/health
              port: internal
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
      {{- with .Values.gateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    app.kubernetes.io/name: gravitee-apim
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: http
      name: http
    - port: {{ .Values.gateway.service.internalPort }}
      targetPort: internal
      name: internal
  selector:
    app.kubernetes.io/name: gravitee-apim
    app.kubernetes.io/component: gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- if .Values.gateway.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-gateway
  minReplicas: {{ .Values.gateway.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.gateway.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.gateway.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
