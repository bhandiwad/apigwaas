# ============================================================================
# CloudInfinit API Gateway - Staging Environment Values
# ============================================================================

replicaCount: 2

image:
  repository: ghcr.io/bhandiwad/cloudinfinit-apigw
  tag: "staging-latest"
  pullPolicy: Always

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: staging.cloudinfinit.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: staging-tls
      hosts:
        - staging.cloudinfinit.io

env:
  NODE_ENV: production
  GRAVITEE_API_URL: "http://gravitee-apim-management-api.gravitee-staging:8083"
  GRAVITEE_ORG_ID: "DEFAULT"
  GRAVITEE_ENV_ID: "DEFAULT"

secrets:
  existingSecret: cloudinfinit-staging-secrets
