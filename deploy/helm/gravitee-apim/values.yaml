# ============================================================================
# Gravitee APIM - Helm Values for CloudInfinit Deployment
# ============================================================================

global:
  imageRegistry: ""
  imagePullSecrets: []

# -- Gravitee Gateway
gateway:
  replicaCount: 3
  image:
    repository: graviteeio/apim-gateway
    tag: "4.4"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8082
    internalPort: 18082
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60
  env:
    - name: gravitee_tags
      value: "internal,external"
    - name: gravitee_tenant
      value: "DEFAULT"
    - name: gravitee_services_core_http_enabled
      value: "true"
    - name: gravitee_services_core_http_port
      value: "18082"
    - name: gravitee_services_core_http_host
      value: "0.0.0.0"
  jvmOpts: "-Xms512m -Xmx1g -XX:+UseG1GC"
  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - gateway
            topologyKey: kubernetes.io/hostname

# -- Gravitee Management API
managementApi:
  replicaCount: 2
  image:
    repository: graviteeio/apim-management-api
    tag: "4.4"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8083
    internalPort: 18083
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  env:
    - name: gravitee_services_core_http_enabled
      value: "true"
    - name: gravitee_services_core_http_port
      value: "18083"
    - name: gravitee_services_core_http_host
      value: "0.0.0.0"
    - name: gravitee_api_rest_cors_allow-origin
      value: "*"
  jvmOpts: "-Xms512m -Xmx1g -XX:+UseG1GC"

# -- Gravitee Console UI
console:
  replicaCount: 2
  image:
    repository: graviteeio/apim-management-ui
    tag: "4.4"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Gravitee Developer Portal UI
portal:
  replicaCount: 2
  image:
    repository: graviteeio/apim-portal-ui
    tag: "4.4"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- MongoDB (Gravitee datastore)
mongodb:
  enabled: true
  architecture: replicaset
  replicaCount: 3
  auth:
    enabled: true
    rootPassword: ""
    existingSecret: mongodb-secrets
  persistence:
    enabled: true
    size: 50Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

# -- Elasticsearch (Gravitee analytics)
elasticsearch:
  enabled: true
  master:
    replicaCount: 3
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi
    persistence:
      enabled: true
      size: 100Gi
  data:
    replicaCount: 2
    resources:
      requests:
        cpu: 1000m
        memory: 4Gi
      limits:
        cpu: 4000m
        memory: 8Gi
    persistence:
      enabled: true
      size: 200Gi

# -- Redis (Rate limiting)
redis:
  host: ""
  port: 6379
  password: ""
  existingSecret: redis-secrets
  ssl: false
