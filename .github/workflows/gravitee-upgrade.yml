name: Gravitee APIM Upgrade

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Gravitee APIM version (e.g., 4.5.0)'
        required: true
        type: string
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - upgrade
          - rollback

env:
  AWS_REGION: ap-south-1

jobs:
  backup:
    name: Pre-upgrade Backup
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'upgrade' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name cloudinfinit-apigw-${{ github.event.inputs.environment }}

      - name: Backup Gravitee MongoDB
        run: |
          NAMESPACE="gravitee-${{ github.event.inputs.environment }}"
          BACKUP_NAME="gravitee-pre-upgrade-$(date +%Y%m%d-%H%M%S)"
          
          # Create backup job
          kubectl exec -n $NAMESPACE deploy/gravitee-apim-mongodb -- \
            mongodump --archive=/tmp/${BACKUP_NAME}.archive --gzip
          
          # Copy backup to local
          kubectl cp $NAMESPACE/$(kubectl get pod -n $NAMESPACE -l app=mongodb -o jsonpath='{.items[0].metadata.name}'):/tmp/${BACKUP_NAME}.archive ./${BACKUP_NAME}.archive
          
          # Upload to S3
          aws s3 cp ./${BACKUP_NAME}.archive \
            s3://cloudinfinit-apigw-${{ github.event.inputs.environment }}-backups/gravitee/${BACKUP_NAME}.archive

      - name: Record current version
        id: current_version
        run: |
          NAMESPACE="gravitee-${{ github.event.inputs.environment }}"
          CURRENT=$(kubectl get deployment -n $NAMESPACE gravitee-apim-gateway -o jsonpath='{.spec.template.spec.containers[0].image}' | cut -d: -f2)
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current Gravitee version: $CURRENT"

    outputs:
      current_version: ${{ steps.current_version.outputs.version }}

  upgrade:
    name: Upgrade Gravitee
    runs-on: ubuntu-latest
    needs: backup
    if: ${{ github.event.inputs.action == 'upgrade' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name cloudinfinit-apigw-${{ github.event.inputs.environment }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Upgrade Gravitee APIM
        run: |
          NAMESPACE="gravitee-${{ github.event.inputs.environment }}"
          VERSION="${{ github.event.inputs.version }}"
          
          helm upgrade gravitee-apim deploy/helm/gravitee-apim \
            --namespace $NAMESPACE \
            --set gateway.image.tag=$VERSION \
            --set managementApi.image.tag=$VERSION \
            --set console.image.tag=$VERSION \
            --set portal.image.tag=$VERSION \
            --wait \
            --timeout 10m

      - name: Verify upgrade
        run: |
          NAMESPACE="gravitee-${{ github.event.inputs.environment }}"
          
          # Wait for rollout
          kubectl rollout status deployment/gravitee-apim-gateway -n $NAMESPACE --timeout=300s
          kubectl rollout status deployment/gravitee-apim-management-api -n $NAMESPACE --timeout=300s
          
          # Health check
          kubectl exec -n $NAMESPACE deploy/gravitee-apim-management-api -- \
            curl -sf http://localhost:18083/_node/health || exit 1
          
          echo "Gravitee APIM upgraded to ${{ github.event.inputs.version }} successfully"

  rollback:
    name: Rollback Gravitee
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'rollback' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name cloudinfinit-apigw-${{ github.event.inputs.environment }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Rollback Gravitee
        run: |
          NAMESPACE="gravitee-${{ github.event.inputs.environment }}"
          helm rollback gravitee-apim -n $NAMESPACE

      - name: Verify rollback
        run: |
          NAMESPACE="gravitee-${{ github.event.inputs.environment }}"
          kubectl rollout status deployment/gravitee-apim-gateway -n $NAMESPACE --timeout=300s
          echo "Gravitee APIM rolled back successfully"
