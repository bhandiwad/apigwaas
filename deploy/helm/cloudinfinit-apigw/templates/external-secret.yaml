{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ include "cloudinfinit-apigw.fullname" . }}-secret-store
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.region | default "ap-south-1" }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ include "cloudinfinit-apigw.fullname" . }}-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "cloudinfinit-apigw.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ include "cloudinfinit-apigw.fullname" . }}-secret-store
    kind: SecretStore
  target:
    name: {{ .Values.secrets.existingSecret | default (printf "%s-secrets" (include "cloudinfinit-apigw.fullname" .)) }}
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: cloudinfinit/{{ .Values.environment | default "staging" }}/database-url
    - secretKey: JWT_SECRET
      remoteRef:
        key: cloudinfinit/{{ .Values.environment | default "staging" }}/jwt-secret
    - secretKey: GRAVITEE_API_TOKEN
      remoteRef:
        key: cloudinfinit/{{ .Values.environment | default "staging" }}/gravitee-token
{{- end }}
