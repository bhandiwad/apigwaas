# ============================================================================
# CloudInfinit API Gateway - Production Environment Values
# ============================================================================

replicaCount: 3

image:
  repository: ghcr.io/bhandiwad/cloudinfinit-apigw
  tag: "latest"
  pullPolicy: Always

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 1Gi

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
  hosts:
    - host: api.cloudinfinit.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: production-tls
      hosts:
        - api.cloudinfinit.io

env:
  NODE_ENV: production
  GRAVITEE_API_URL: "http://gravitee-apim-management-api.gravitee-production:8083"
  GRAVITEE_ORG_ID: "DEFAULT"
  GRAVITEE_ENV_ID: "DEFAULT"

secrets:
  existingSecret: cloudinfinit-production-secrets

podDisruptionBudget:
  enabled: true
  minAvailable: 2
