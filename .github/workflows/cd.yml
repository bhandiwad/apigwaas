name: CD - Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  HELM_CHART_PATH: deploy/helm/cloudinfinit-apigw

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name cloudinfinit-apigw-staging --region ap-south-1

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Deploy platform to staging
        run: |
          helm upgrade --install cloudinfinit-apigw ${{ env.HELM_CHART_PATH }} \
            --namespace cloudinfinit-staging \
            --create-namespace \
            --values ${{ env.HELM_CHART_PATH }}/values-staging.yaml \
            --set platform.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set platform.image.tag=${{ github.sha }} \
            --set platform.env.NODE_ENV=staging \
            --set platform.env.DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }} \
            --set platform.env.GRAVITEE_API_URL=${{ secrets.STAGING_GRAVITEE_API_URL }} \
            --set platform.env.GRAVITEE_API_TOKEN=${{ secrets.STAGING_GRAVITEE_API_TOKEN }} \
            --set platform.env.GRAVITEE_ORG_ID=${{ secrets.STAGING_GRAVITEE_ORG_ID }} \
            --set platform.env.GRAVITEE_ENV_ID=${{ secrets.STAGING_GRAVITEE_ENV_ID }} \
            --wait \
            --timeout 300s

      - name: Deploy Gravitee APIM to staging
        run: |
          helm upgrade --install gravitee-apim deploy/helm/gravitee-apim \
            --namespace gravitee-staging \
            --create-namespace \
            --values deploy/helm/gravitee-apim/values.yaml \
            --set gateway.replicaCount=2 \
            --set managementApi.replicaCount=1 \
            --wait \
            --timeout 600s

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/cloudinfinit-apigw -n cloudinfinit-staging --timeout=120s
          echo "Staging deployment successful"

      - name: Run smoke tests
        run: |
          STAGING_URL=$(kubectl get ingress -n cloudinfinit-staging -o jsonpath='{.items[0].spec.rules[0].host}')
          echo "Running smoke tests against: $STAGING_URL"
          # Health check via tRPC system health endpoint
          curl -sf "https://$STAGING_URL/api/trpc/system.health" || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    needs: deploy-staging
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name cloudinfinit-apigw-production --region ap-south-1

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Deploy platform to production
        run: |
          helm upgrade --install cloudinfinit-apigw ${{ env.HELM_CHART_PATH }} \
            --namespace cloudinfinit-production \
            --create-namespace \
            --values ${{ env.HELM_CHART_PATH }}/values-production.yaml \
            --set platform.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set platform.image.tag=${{ github.ref_name }} \
            --set platform.replicaCount=3 \
            --set platform.env.NODE_ENV=production \
            --set platform.env.DATABASE_URL=${{ secrets.PROD_DATABASE_URL }} \
            --set platform.env.GRAVITEE_API_URL=${{ secrets.PROD_GRAVITEE_API_URL }} \
            --set platform.env.GRAVITEE_API_TOKEN=${{ secrets.PROD_GRAVITEE_API_TOKEN }} \
            --set platform.env.GRAVITEE_ORG_ID=${{ secrets.PROD_GRAVITEE_ORG_ID }} \
            --set platform.env.GRAVITEE_ENV_ID=${{ secrets.PROD_GRAVITEE_ENV_ID }} \
            --set platform.autoscaling.enabled=true \
            --set platform.autoscaling.minReplicas=3 \
            --set platform.autoscaling.maxReplicas=10 \
            --wait \
            --timeout 300s

      - name: Deploy Gravitee APIM to production
        run: |
          helm upgrade --install gravitee-apim deploy/helm/gravitee-apim \
            --namespace gravitee-production \
            --create-namespace \
            --values deploy/helm/gravitee-apim/values.yaml \
            --set gateway.replicaCount=5 \
            --set managementApi.replicaCount=3 \
            --set gateway.resources.requests.memory=2Gi \
            --set gateway.resources.requests.cpu=1000m \
            --wait \
            --timeout 600s

      - name: Verify production deployment
        run: |
          kubectl rollout status deployment/cloudinfinit-apigw -n cloudinfinit-production --timeout=180s
          echo "Production deployment successful"

      - name: Run production smoke tests
        run: |
          PROD_URL=$(kubectl get ingress -n cloudinfinit-production -o jsonpath='{.items[0].spec.rules[0].host}')
          curl -sf "https://$PROD_URL/api/trpc/system.health" || exit 1

      - name: Notify deployment success
        if: success()
        run: |
          echo "Production deployment of ${{ github.ref_name }} completed successfully"
