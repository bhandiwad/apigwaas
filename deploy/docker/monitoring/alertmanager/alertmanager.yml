global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 5s
    - match:
        severity: warning
      receiver: 'warning'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://platform:3000/api/webhooks/alerts'
        send_resolved: true

  - name: 'critical'
    webhook_configs:
      - url: 'http://platform:3000/api/webhooks/alerts'
        send_resolved: true
    # Uncomment and configure for production:
    # email_configs:
    #   - to: 'ops@yourdomain.com'
    #     from: 'alertmanager@yourdomain.com'
    #     smarthost: 'smtp.yourdomain.com:587'
    #     auth_username: 'alertmanager@yourdomain.com'
    #     auth_password: 'password'
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/xxx/yyy/zzz'
    #     channel: '#ops-critical'
    #     title: '{{ .GroupLabels.alertname }}'
    #     text: '{{ .CommonAnnotations.description }}'

  - name: 'warning'
    webhook_configs:
      - url: 'http://platform:3000/api/webhooks/alerts'
        send_resolved: true
