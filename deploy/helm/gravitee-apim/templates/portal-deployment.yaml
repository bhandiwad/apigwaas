apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gravitee-apim.fullname" . }}-portal
  labels:
    app.kubernetes.io/component: portal
    {{- include "gravitee-apim.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.portal.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: portal
      {{- include "gravitee-apim.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: portal
        {{- include "gravitee-apim.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: portal-ui
          image: "{{ .Values.portal.image.repository }}:{{ .Values.portal.image.tag }}"
          imagePullPolicy: {{ .Values.portal.image.pullPolicy }}
          ports:
            - containerPort: 8003
              protocol: TCP
          env:
            - name: PORTAL_API_URL
              value: "http://{{ include "gravitee-apim.fullname" . }}-management-api:8083/management"
          resources:
            {{- toYaml .Values.portal.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gravitee-apim.fullname" . }}-portal
  labels:
    app.kubernetes.io/component: portal
    {{- include "gravitee-apim.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8003
      targetPort: 8003
      protocol: TCP
  selector:
    app.kubernetes.io/component: portal
    {{- include "gravitee-apim.selectorLabels" . | nindent 4 }}
